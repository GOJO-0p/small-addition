<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity | Typing Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>VELOCITY</h1>
            <p class="subtitle">Test your typing speed</p>
        </header>

        <div id="start-screen" class="screen active">
            <button id="start-btn" class="primary-btn">Start Game</button>
            <div class="instructions">
                <p>Type the words as fast as you can. You have 60 seconds!</p>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="stats-board">
                <div class="stat-box">
                    <span class="label">Time</span>
                    <div><span id="time" class="value">60</span><span class="unit">s</span></div>
                </div>
                <div class="stat-box" style="text-align: right;">
                    <span class="label">Score</span>
                    <span id="score" class="value">0</span>
                </div>
            </div>

            <div class="game-area">
                <h2 id="word-display" class="word-display">Loading...</h2>
                <input type="text" id="word-input" class="word-input" autocomplete="off" autofocus placeholder="Type here...">
            </div>
        </div>

        <div id="end-screen" class="screen">
            <h2>Time's Up!</h2>
            <div class="final-stats">
                <div class="stat-item">
                    <span class="label">WPM</span>
                    <span id="final-wpm" class="value highlight">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Words</span>
                    <span id="final-score" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Accuracy</span>
                    <span id="final-accuracy" class="value">100%</span>
                </div>
            </div>
            <button id="restart-btn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
